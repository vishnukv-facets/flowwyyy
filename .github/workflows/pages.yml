name: Pages

# Publishes the static site under site/ to GitHub Pages.
# Assets stay single-sourced: the build step stages assets/ and docs/ui/
# into the artifact, so the 2 MB demo gif + screenshots aren't duplicated.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'assets/**'
      - 'docs/ui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp site/index.html site/docs.html site/api.html site/styles.css site/favicon.svg _site/
          cp -r assets _site/assets
          cp -r docs/ui _site/img
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
