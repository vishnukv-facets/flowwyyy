name: CI

on:
  pull_request:
    branches: [main]

jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --new-from-merge-base can diff against base
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Ensure the PR's base branch is a local remote-tracking ref so
      # golangci-lint can compute the merge base for new-issue detection.
      - name: Fetch base branch
        run: git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          # Gate on NEW findings only (a PR can't add lint debt; the pre-existing
          # backlog is burned down separately — see .golangci.yml), computed via
          # LOCAL GIT (merge-base with the base branch) rather than the GitHub diff
          # API. The API path (only-new-issues) 406s on diffs over 20000 lines,
          # which the two-binary-split PR exceeds; --new-from-merge-base has no
          # such cap and gives identical semantics.
          args: --new-from-merge-base=origin/${{ github.base_ref }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
