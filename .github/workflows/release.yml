name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            asset: flow-darwin-arm64
          - goarch: amd64
            asset: flow-darwin-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.asset }}
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o flow .
          tar -czf "${{ matrix.asset }}.tar.gz" flow
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 flow-darwin-*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/flow-darwin-arm64.tar.gz
            dist/flow-darwin-amd64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
