name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            asset: flow-darwin-arm64
          - goarch: amd64
            asset: flow-darwin-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The embedded UI (internal/server/static/) is gitignored and built by
      # `make ui`. Without this the binary embeds only the brand SVGs and serves
      # "static assets unavailable". Must run BEFORE `go build` (which embeds via
      # //go:embed all:static).
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build UI
        run: make ui
      - name: Build ${{ matrix.asset }}
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          # Two-binary product: the core engine (cmd/flow) and the product
          # binary (cmd/flowwyyy, which execs the sibling `flow`). The repo root
          # no longer has a main package, so both are built from ./cmd/...
          # INTERIM (T15): we bundle BOTH binaries in the flowwyyy tarball
          # because official Facets-cloud/flow does not yet ship flowwyyy's core
          # surface (T14 upstreaming milestone). Once it does, this drops the
          # bundled `flow` and the formula switches to `depends_on` official flow.
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o flow ./cmd/flow
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o flowwyyy ./cmd/flowwyyy
          tar -czf "${{ matrix.asset }}.tar.gz" flow flowwyyy
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 flow-darwin-*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/flow-darwin-arm64.tar.gz
            dist/flow-darwin-amd64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Bump the Homebrew tap formula to this release. Pushes to the separate
  # vishnukv-facets/homebrew-flowwyyy repo via a write deploy key (the default
  # GITHUB_TOKEN can't push cross-repo). The HOMEBREW_TAP_DEPLOY_KEY secret holds
  # the deploy key's private half; the job skips cleanly when it's unset.
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    env:
      DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
    steps:
      - name: Bump tap formula
        if: ${{ env.DEPLOY_KEY != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          gh release download "$TAG" --repo "$REPO" --pattern SHA256SUMS
          ARM_SHA="$(awk '/flow-darwin-arm64\.tar\.gz/ {print $1}' SHA256SUMS)"
          AMD_SHA="$(awk '/flow-darwin-amd64\.tar\.gz/ {print $1}' SHA256SUMS)"
          if [ -z "$ARM_SHA" ] || [ -z "$AMD_SHA" ]; then
            echo "could not parse checksums from SHA256SUMS" >&2
            exit 1
          fi
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -t ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          git clone git@github.com:vishnukv-facets/homebrew-flowwyyy.git tap
          mkdir -p tap/Formula
          cat > tap/Formula/flowwyyy.rb <<EOF
          class Flowwyyy < Formula
            desc "Task and memory layer for Claude Code and Codex (flow, with batteries)"
            homepage "https://github.com/vishnukv-facets/flowwyyy"
            version "${VERSION}"
            license "MIT"
            depends_on :macos

            if Hardware::CPU.arm?
              url "https://github.com/vishnukv-facets/flowwyyy/releases/download/${TAG}/flow-darwin-arm64.tar.gz"
              sha256 "${ARM_SHA}"
            else
              url "https://github.com/vishnukv-facets/flowwyyy/releases/download/${TAG}/flow-darwin-amd64.tar.gz"
              sha256 "${AMD_SHA}"
            end

            # Two binaries: the core engine \`flow\` and the product binary
            # \`flowwyyy\`. flowwyyy resolves \`flow\` as a sibling in the same
            # prefix bin (flowclient.Resolve). INTERIM (T15): \`flow\` is bundled
            # here until official Facets-cloud/flow ships flowwyyy's core surface
            # (T14); then this becomes \`depends_on "facets-cloud/flow/flow"\`.
            def install
              bin.install "flow"
              bin.install "flowwyyy"
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/flow --version")
              assert_match "${VERSION}", shell_output("#{bin}/flowwyyy --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/flowwyyy.rb
          git diff --cached --quiet || git commit -m "flowwyyy ${VERSION}"
          git push
      - name: Skipped (no deploy key)
        if: ${{ env.DEPLOY_KEY == '' }}
        run: echo "HOMEBREW_TAP_DEPLOY_KEY not set — skipping Homebrew formula bump."
