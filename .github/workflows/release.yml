name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            asset: flow-darwin-arm64
          - goarch: amd64
            asset: flow-darwin-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.asset }}
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o flow .
          tar -czf "${{ matrix.asset }}.tar.gz" flow
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: ${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 flow-darwin-*.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/flow-darwin-arm64.tar.gz
            dist/flow-darwin-amd64.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Bump the Homebrew tap formula to this release. Requires a HOMEBREW_TAP_TOKEN
  # secret (a PAT with contents:write on vishnukv-facets/homebrew-flowwyyy) —
  # the default GITHUB_TOKEN can't push to another repo. Skips cleanly if unset.
  homebrew:
    needs: release
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Bump tap formula
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          gh release download "$TAG" --repo "$REPO" --pattern SHA256SUMS
          ARM_SHA="$(awk '/flow-darwin-arm64\.tar\.gz/ {print $1}' SHA256SUMS)"
          AMD_SHA="$(awk '/flow-darwin-amd64\.tar\.gz/ {print $1}' SHA256SUMS)"
          if [ -z "$ARM_SHA" ] || [ -z "$AMD_SHA" ]; then
            echo "could not parse checksums from SHA256SUMS" >&2
            exit 1
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/vishnukv-facets/homebrew-flowwyyy.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/flowwyyy.rb <<EOF
          class Flowwyyy < Formula
            desc "Task and memory layer for Claude Code and Codex (flow, with batteries)"
            homepage "https://github.com/vishnukv-facets/flowwyyy"
            version "${VERSION}"
            license "MIT"
            depends_on :macos

            if Hardware::CPU.arm?
              url "https://github.com/vishnukv-facets/flowwyyy/releases/download/${TAG}/flow-darwin-arm64.tar.gz"
              sha256 "${ARM_SHA}"
            else
              url "https://github.com/vishnukv-facets/flowwyyy/releases/download/${TAG}/flow-darwin-amd64.tar.gz"
              sha256 "${AMD_SHA}"
            end

            def install
              bin.install "flow"
            end

            test do
              assert_match "${VERSION}", shell_output("#{bin}/flow --version")
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/flowwyyy.rb
          git diff --cached --quiet || git commit -m "flowwyyy ${VERSION}"
          git push
      - name: Skipped (no tap token)
        if: ${{ env.TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN not set — skipping formula bump. Add a PAT with contents:write on vishnukv-facets/homebrew-flowwyyy to enable."
