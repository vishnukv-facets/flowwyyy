<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-label="flow">
  <title>flow — task and memory layer for Claude Code and Codex</title>
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#645df6"/>
      <stop offset="1" stop-color="#8b87f8"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#3a35c4"/>
      <stop offset="0.55" stop-color="#645df6"/>
      <stop offset="1"    stop-color="#8b87f8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#0AEAA8"/>
      <stop offset="0.55" stop-color="#0ADCCE"/>
      <stop offset="1"    stop-color="#198FFF"/>
    </linearGradient>
    <style>
      .wordmark { fill: url(#wordGrad); font: 700 168px/1 -apple-system, "SF Pro Display", "Inter", "Segoe UI", system-ui, sans-serif; letter-spacing: -6px; }
      .dot      { fill: #645df6; }
    </style>
  </defs>

  <!-- App mark: rounded square with wave + anchor dots, mirrors the UI logo -->
  <rect x="10" y="10" width="200" height="200" rx="44" fill="url(#markGrad)"/>
  <path d="M50 138 Q78 138 78 110 Q78 82 110 82 Q142 82 142 110 Q142 138 170 138"
        fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  <circle cx="50"  cy="138" r="11" fill="#ffffff"/>
  <circle cx="170" cy="138" r="11" fill="#ffffff"/>

  <!-- Wordmark — single gradient fill so it reads on light AND dark backgrounds -->
  <g transform="translate(248,170)">
    <text class="wordmark">flow</text>
    <circle class="dot" cx="436" cy="-12" r="14"/>
  </g>

  <!-- Subtle gradient underline carrying the Facets/flow accent -->
  <rect x="248" y="186" width="436" height="6" rx="3" fill="url(#accent)"/>
</svg>
